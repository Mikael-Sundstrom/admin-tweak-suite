name: WordPress Plugin Check & Compatibility Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  plugin-check:
    name: Run Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Install WP-CLI and PHPCS
        run: |
          composer global require wp-cli/wp-cli-bundle squizlabs/php_codesniffer
          wp --info

      - name: Install WordPress Coding Standards (WPCS)
        run: |
          git clone -b trunk https://github.com/WordPress/WordPress-Coding-Standards.git ~/wpcs
          phpcs --config-set installed_paths ~/wpcs
          phpcs -i  # Verifiera installationen

      - name: Run PHP CodeSniffer (WordPress Coding Standards)
        run: |
          phpcs --standard=WordPress admin-tweak-suite.php

  compatibility-test:
    name: WordPress Compatibility Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        wordpress: ["5.9", "6.0", "6.3", "6.7", "latest"]
        php: ["7.4", "8.0", "8.2"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install WordPress
        run: |
          WP_VERSION=${{ matrix.wordpress }}
          curl -O https://wordpress.org/wordpress-$WP_VERSION.tar.gz
          tar -xzf wordpress-$WP_VERSION.tar.gz
          mv wordpress /tmp/wordpress

      - name: Set up WordPress Plugin
        run: |
          mkdir -p /tmp/wordpress/wp-content/plugins/admin-tweak-suite
          cp -r * /tmp/wordpress/wp-content/plugins/admin-tweak-suite

      - name: Validate PHP syntax
        run: php -l admin-tweak-suite.php

      - name: Run compatibility tests
        run: |
          php /tmp/wordpress/wp-content/plugins/admin-tweak-suite/admin-tweak-suite.php
