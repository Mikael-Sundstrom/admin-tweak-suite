name: PHP Code Standards & Compatibility Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  php-check:
    name: PHP Standards & Compatibility
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["7.0", "7.4", "8.0", "8.1", "8.2", "8.3", "8.4"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Install PHP CodeSniffer & Compatibility Tools
        run: |
          composer global require squizlabs/php_codesniffer phpcompatibility/php-compatibility php-parallel-lint/php-parallel-lint
          phpcs -i  # Kontrollera installationen

      - name: Run PHP Syntax Check
        run: find . -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run PHP CodeSniffer (PHPCS)
        run: |
          phpcs --standard=WordPress --ignore=vendor/* .  # Kontrollera kodstandard

      - name: Run PHP Compatibility Check
        run: |
          phpcs --standard=PHPCompatibility --runtime-set testVersion ${{ matrix.php-version }} --ignore=vendor/* .
