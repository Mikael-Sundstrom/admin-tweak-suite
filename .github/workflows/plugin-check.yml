name: WordPress Plugin Check & Compatibility Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  plugin-check:
    name: Run Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Install WP-CLI and PHPCS
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          composer global require squizlabs/php_codesniffer phpcompatibility/php-compatibility
          wp --info  # Kontrollera WP-CLI installation

      - name: Install WordPress Coding Standards (WPCS)
        run: |
          git clone --depth=1 https://github.com/WordPress/WordPress-Coding-Standards.git ~/wpcs
          phpcs --config-set installed_paths ~/wpcs,$(composer global config --absolute vendor-dir)/phpcompatibility/php-compatibility
          phpcs -i  # Verifiera installationen

      - name: Run PHP CodeSniffer (WordPress Coding Standards)
        run: |
          find . -name "*.php" -print0 | xargs -0 -n1 php -l  # Syntaxkontroll av alla PHP-filer
          phpcs --standard=WordPress --ignore=vendor/* .  # Kontrollera kodstandard

  compatibility-test:
    name: WordPress Compatibility Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        wordpress-version: ["5.9", "6.0", "6.3", "latest"]
        php-version: ["7.4", "8.0", "8.2"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --info  # Kontrollera installationen

      - name: Install WordPress
        run: |
          WP_VERSION=${{ matrix.wordpress-version }}
          curl -O https://wordpress.org/wordpress-$WP_VERSION.tar.gz
          tar -xzf wordpress-$WP_VERSION.tar.gz
          mv wordpress /tmp/wordpress
  
      - name: Start MySQL Database
        run: |
          sudo systemctl start mysql || sudo service mysql start
          sudo mysql -e "CREATE DATABASE IF NOT EXISTS wordpress;"
          sudo mysql -e "CREATE USER 'root'@'localhost' IDENTIFIED BY 'root';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON wordpress.* TO 'root'@'localhost';"
          sudo mysql -e "FLUSH PRIVILEGES;"

      - name: Configure WordPress
        run: |
          cd /tmp/wordpress
          wp config create --dbname=wordpress --dbuser=root --dbpass=root --dbhost=localhost --path=/tmp/wordpress
          wp core install --url="http://localhost" --title="Test Site" --admin_user="admin" --admin_password="password" --admin_email="admin@example.com" --path=/tmp/wordpress

      - name: Validate PHP syntax
        run: find /tmp/wordpress/wp-content/plugins/admin-tweak-suite -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run compatibility tests
        run: |
          cd /tmp/wordpress
          wp plugin activate admin-tweak-suite
          wp plugin verify-checksums admin-tweak-suite
          wp plugin status admin-tweak-suite

      - name: Deactivate WordPress Plugin
        run: |
          cd /tmp/wordpress
          wp plugin deactivate admin-tweak-suite
